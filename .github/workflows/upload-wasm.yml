name: Deploy procedure to Zela
on:
  workflow_dispatch:
    inputs:
      procedure:
        description: "Which procedure to deploy"
        required: true
        type: choice
        options:
          - hello_world

jobs:
  zela:
    runs-on: ubuntu-latest
    steps:
      # we install wasi-sdk and add the rustup target
      # this is needed to build FFI code (e.g. openssl) to wasm using clang
      - name: Install WASI SDK
        run: |
          curl -L --progress-bar -o /tmp/wasi-sdk.deb https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-30/wasi-sdk-30.0-x86_64-linux.deb
          sudo dpkg -i /tmp/wasi-sdk.deb
          rustup target add wasm32-wasip2
      - uses: actions/checkout@v4
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "deploy-procedure"
          cache-on-failure: true
      - env:
          # needs to be set for the build process to pick up the downloaded wasi-sdk - this is the value when installing the deb package
          WASI_SYSROOT: /opt/wasi-sdk/share/wasi-sysroot
        run: |
          cargo build --release --target wasm32-wasip2 --package ${{ inputs.procedure }}
      - env:
          ZELA_KEY_ID: ${{ vars.ZELA_KEY_ID }}
          ZELA_KEY_SECRET: ${{ secrets.ZELA_KEY_SECRET }}
          ZELA_PROJECT: ${{ vars.ZELA_PROJECT }}
          ZELA_PROCEDURE: ${{ inputs.procedure }}
          ZELA_PROCEDURE_WASM: ${{ inputs.procedure }}.wasm
        run: |
          token=$(curl -sS --user "$ZELA_KEY_ID:$ZELA_KEY_SECRET" \
           	--data-urlencode 'grant_type=client_credentials' --data-urlencode 'scope=zela-builder:read zela-builder:write' \
           	"https://auth.zela.io/realms/zela/protocol/openid-connect/token" | jq -r .access_token)

          curl --progress-bar -f -H "authorization: Bearer $token" -H 'content-type: application/wasm' \
           	--data-binary "@target/wasm32-wasip2/release/$ZELA_PROCEDURE_WASM" \
           	"https://core.zela.io/procedures/$ZELA_PROCEDURE/wasm?project=$ZELA_PROJECT&file_name=$ZELA_PROCEDURE_WASM"
